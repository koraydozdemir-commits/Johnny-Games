<script>
  const ruffle = window.RufflePlayer?.newest();
  const player = ruffle.createPlayer();
  player.style.width = "100%";
  player.style.height = "100%";
  container.appendChild(player);

  player.load("https://cdn.jsdelivr.net/gh/sasa24s/Sphere-compile@95d1d98dc38a920d02e6bbcf61620501b2bacfcb/tables/pvz_9_15.swf");

  // Wait a few seconds for SWF to initialize, then attempt load/save
  setTimeout(() => {
    const savedProgress = loadProgress();

    if (savedProgress && player.call) {
      try {
        player.call("loadProgress", savedProgress);
        console.log("Sent saved progress to SWF.");
      } catch (e) {
        console.warn("SWF does not support loadProgress():", e);
      }
    }

    // Auto-save every 15 seconds
    setInterval(() => {
      if (player.call) {
        try {
          const progress = player.call("getProgress");
          if (progress) saveProgress(progress);
        } catch (e) {
          // Ignore if SWF doesn't have getProgress()
        }
      }
    }, 15000);
  }, 3000); // 3 seconds delay
</script>
